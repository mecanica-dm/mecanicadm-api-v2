spring.application.name=mecanica-dm-api

spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:5432/${POSTGRES_DB:mecanicadmdb}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=validate
spring.messages.encoding=UTF-8
spring.messages.basename=i18n/messages
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

api.security.token.secret=development

cors.allowed-origins=*

# Habilita os endpoints de Liveness e Readiness do Kubernetes
management.endpoint.health.probes.enabled=true
# Expõe os endpoints via Web
management.endpoints.web.exposure.include=health,info,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.error.include-stacktrace=never
server.error.include-message=never

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.tagsSorter=alpha

app.budget.base-url=${BUDGET_BASE_URL:http://localhost:8080}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:username}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
