spring.application.name=mecanica-dm-api
spring.datasource.url=jdbc:postgresql://db:5432/mecanicadmdb
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=validate
spring.messages.encoding=UTF-8
spring.messages.basename=i18n/messages
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

api.security.token.secret=development

cors.allowed-origins=*

# Habilita os endpoints de Liveness e Readiness do Kubernetes
management.endpoint.health.probes.enabled=true
# Expõe os endpoints via Web
management.endpoints.web.exposure.include=health,info,prometheus
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.error.include-stacktrace=never

springdoc.swagger-ui.docExpansion=none