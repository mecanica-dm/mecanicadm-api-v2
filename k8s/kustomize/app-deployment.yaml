apiVersion: apps/v1
kind: Deployment
metadata:
  name: mecanica-dm-api
  namespace: mecanicadm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mecanica-dm-api
  template:
    metadata:
      labels:
        app: mecanica-dm-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.28
          command: [ 'sh', '-c', "until nc -zv postgres-db 5432; do echo waiting for postgres; sleep 2; done;" ]
      containers:
        - name: api
          image: mecanica-dm-api:latest
          imagePullPolicy: IfNotPresent # Se não encontrar no docker hub, busca pela imagem localmente
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: postgres-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: postgres-password
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5